version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: predup-db
    environment:
      POSTGRES_USER: predup
      POSTGRES_PASSWORD: predup
      POSTGRES_DB: predup
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U predup"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build: .
    container_name: predup-api
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://predup:predup@postgres:5432/predup
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres_data: